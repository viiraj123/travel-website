<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RoamScape - Travel Journal</title>
  <link rel="stylesheet" href="journal.css" />
</head>
<body>
  <header>
    <h1>RoamScape Travel Journal</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="journal.html" class="active">Journal</a>
      <a href="gallery.html">Gallery</a>
    </nav>
  </header>

  <main>
    <section class="journal-form">
      <h2>New Entry</h2>
      <form id="entryForm">
        <input type="text" id="title" placeholder="Entry Title" required />
        <textarea id="content" rows="5" placeholder="Write about your journey..." required></textarea>
        <input type="date" id="date" required />
        <button type="submit">Add Entry</button>
      </form>
    </section>

    <section class="entries" id="entries">
      <h2>Past Entries</h2>
      <!-- Entries will appear here -->
    </section>
  </main>

  <script src="journal.js"></script>
</body>
</html>
